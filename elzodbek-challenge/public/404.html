<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GoalFlow</title>
  <script>
    // GitHub Pages SPA routing fix
    // Redirects all 404s back to index.html with the path preserved
    var path = window.location.pathname;
    var base = '/4-oylik-chalange-men-uchun';
    var rest = path.replace(base, '');
    var search = window.location.search;
    var hash = window.location.hash;
    var query = '?p=' + encodeURIComponent(rest + search) + '&' + hash;
    window.location.replace(base + '/' + query);
  </script>
</head>
<body></body>
</html>
